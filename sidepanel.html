<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: sans-serif;
            font-size: 14px;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            gap: 8px;
        }
        label {
            font-weight: bold;
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        textarea {
            width: 100%;
            resize: vertical;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 6px;
        }
        #template { flex: 2; min-height: 80px; }
        #result { flex: 1; min-height: 40px; background: #f9f9f9; }
        .buttons { display: flex; gap: 8px; }
        button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        #generateBtn { background: #4a90e2; color: white; }
        #generateBtn:hover { background: #357abd; }
        #insertBtn { background: #27ae60; color: white; }
        #insertBtn:hover { background: #1e8449; }
        #insertBtn:disabled { background: #aaa; cursor: default; }
        #generateInsertBtn { background: #8e44ad; color: white; }
        #generateInsertBtn:hover { background: #7d3c98; }
        #status { font-size: 12px; color: #888; min-height: 16px; }
        .options { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; }
        .folder-row { display: flex; align-items: center; gap: 6px; }
        .sites { display: flex; gap: 8px; align-items: center; }
        @keyframes pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .sites a { display: flex; opacity: 0.5; transition: opacity 0.15s; }
        .sites a:hover, .sites a.active { opacity: 1; animation: pop 0.25s ease-out; }
        .sites img { width: 32px; height: 32px; border-radius: 6px; }
        .sites-more { width: 32px; height: 32px; border-radius: 6px; background: #eee; align-items: center; justify-content: center; font-size: 18px; color: #888; text-decoration: none; letter-spacing: -2px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
        .copyBtn { flex: none; padding: 2px 4px; background: none; color: #aaa; border: none; cursor: pointer; display: flex; align-items: center; }
        .copyBtn:hover { color: #555; }
        #folderBtn { flex: none; padding: 4px 8px; font-size: 12px; font-weight: normal; background: #eee; color: #333; border: 1px solid #ccc; }
        #folderBtn:hover { background: #ddd; }
        #folderName { font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

<div class="label-row"><label>Template</label><button class="copyBtn" data-target="template" title="Copy"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>
<textarea id="template" placeholder="a {red|blue|green} {cat|dog} on a {sunny|rainy} day"></textarea>

<div class="label-row"><label>Result</label><button class="copyBtn" data-target="result" title="Copy"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>
<textarea id="result" readonly placeholder="Generated prompt will appear here..."></textarea>

<div class="folder-row">
    <button id="folderBtn">📁 Wildcards folder</button>
    <span id="folderName">not set</span>
</div>

<div class="options">
    <input type="checkbox" id="oneLineChk" checked>
    <label for="oneLineChk" style="text-transform:none; letter-spacing:normal; font-weight:normal;">One line</label>
</div>

<div class="buttons">
    <button id="generateBtn">Generate</button>
    <button id="insertBtn" disabled>Insert into page</button>
    <button id="generateInsertBtn">Generate &amp; Insert</button>
</div>

<div id="status"></div>

<script src="parser.js"></script>
